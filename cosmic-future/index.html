 const bhStart=E.lgP!==null?E.lgP+0.6:23;
 o.bh=sstep(bhStart,bhStart+1.2,s)*(1-sstep(E.lgB+0.02,E.lgB+0.3,s));
 /* 末刻爆闪：s 贴近 lgB */

 if(dl<0.05&&dl>-0.05)o.flash=Math.exp(-Math.pow(dl/0.008,2));

 axes(x0,y0,x0,y1);ctx.beginPath();ctx.moveTo(x0,y1);ctx.lineTo(x1,y1);ctx.stroke();

 for(let i=0;i<=400;i++){const fr=i/400,t=fr*b.tau;

 ctx.stroke();

 if(t<b.tau){const fr=t/b.tau,px=x0+fr*(x1-x0),py=y1-bhFrac(t)*(y1-y0);

 ctx.fillStyle='#ff8c7a';ctx.font='16px ui-monospace';
 ctx.fillText(`末 1 秒：M≈230 吨 → E≈2×10²² J ≈ 百万颗氢弹`,x0+270,y1-30);

 if(lg<11)return (t/1e9).toFixed(1)+' 十亿年';
 const sup='⁰¹²³⁴⁵⁶⁷⁸⁹';
 const e=Math.floor(lg),m=Math.pow(10,lg-e);

 return `${m.toFixed(1)}×10${es} 年`}
function updStory(){const E=eras(),s=S,t=Math.pow(10,S);

 else if(s<E.lgLast+0.1)setStory('第二幕 · 最后一颗恒星','它必然是一颗 0.08 M☉ 的红矮星——全对流让它烧掉全部的氢,苟到 ~4×10¹³ 年（本页由寿命函数涌现）。它熄灭之后,宇宙再无恒星点燃。','熄灭时刻 4.4×10¹³ 年=tMS(0.08 M☉) 涌现值,非硬编码。');
 else if(s<16.8)setStory('第三幕 · 白矮星的余烬','恒星尸体按 Mestel 定律冷却:L∝t^(-7/5)。今天(138 亿年)最冷的白矮星才降到 ~3800 K——白热阶段早在恒星时代内部就走完了;你眼前是最后一批尸体的余烬:数百开尔文的暗红,正滑向彻底的黑(T<100K 于 ~3×10¹⁴ 年,涌现值)。','球色=Planck 色温真算(暗红→黑);"今天最冷 3457K"与黑化时间均由 Mestel 定律涌现,见右图三温线。');
 else if(s<22.5)setStory('第四幕 · 星系散伙','引力弹弓玩了亿亿年后:~90% 的恒星尸体被甩进星系际虚空,~10% 落入中心黑洞(时标 ~10¹⁹⁻²⁰ 年)。幸存的行星轨道也在被引力波蚕食——冻结地球将于 ~10²³ 年旋进死去的太阳。','蒸发比例与时标取 Adams & Laughlin (1997);地球轨道 GW 衰减 1.1×10²³ 年为本页真算。');
 else if(E.lgP!==null&&s<E.lgP+0.5)setStory('第五幕 · 质子的死期（假设）',`若质子寿命 τ=${tauP.toExponential(0).replace('e+','×10^')} 年,黑矮星将靠核子衰变发出 ~${wdPower(tauP).toFixed(0)} 瓦的微光——一整颗恒星尸体,功率不如一台电水壶。烧完即消失,宇宙只剩黑洞。`,'质子衰变未被证实(Super-K 下限 1.6×10³⁴ 年);滑杆改 τ 即重排本幕时间。功率为真算。');
 else if(s<E.lgB+0.05)setStory('第六幕 · 黑洞时代',`只剩黑洞与虚空。${BHS[bhSel].n} 的视界温度 ${BHS[bhSel].TH.toExponential(1)} K——直到 ~3×10¹¹ 年 CMB 冷过它,蒸发才净开始。此后 (1−t/τ)^⅓ 缓慢缩水,τ=${BHS[bhSel].tau.toExponential(1)} 年。末刻:最后一秒 ~10²² 焦耳,一场迟到 10⁶⁷ 年的谢幕烟花。`,'蒸发 ODE 与解析对拍 ±2%;黑洞剪影/光子环为示意(透镜略);爆闪时长艺术化(真实<1s)。');
 else setStory('终幕 · 黑暗时代','没有恒星、没有尸骸、没有黑洞。只有稀薄到一个可观测宇宙大的正电子偶素,和趋近绝对零度的光子海。这是热寂——物理学最有把握的默认剧本。但真空衰变、玻尔兹曼涨落、新宇宙的诞生……在 10^10^115 年的尺度上,谁也不敢把话说死。','正电子偶素/庞加莱回归为理论推测;本页只演到物理学敢下注的地方。');
 }

window.__CF__={
 T0AGE,aOf,Tcmb,tMS,T_LAST,lumFrac,LWD,TeffWD,wdTemp,tauH,TH,TCROSS,TGW,wdPower,KH,E1S,BHS,eras,sceneOf,bhFrac,DICT,
 mestelSlope(){const l1=LWD(1e12),l2=LWD(1e15);return Math.log10(l2/l1)/3},
 hawkODE(){let M=Msun,t=0;const tau=tauH(Msun)*3.156e7,N=20000,dt=tau/N;
  for(let i=0;i<N&&M>1e5;i++){M-=KH/(M*M)*dt;t+=dt}return t/tau},
 state(){return {S,cruise,tpOn,tauP,bhSel,flash:flashHold,
  fps:fps.length?fps.reduce((a,b)=>a+b)/fps.length:0}},
 setS(v){S=clamp(v,LG0+0.001,LG1);cruise=false;upd()},
 setTp(on,tau){tpOn=on;if(tau)tauP=tau;upd()},
 setBH(i){bhSel=i;$$('#ctrl .bh .mbtn').forEach((x,k)=>x.classList.toggle('on',k===i));upd()},
 setYawPitch(y,p,d){yaw=y;pitch=p;if(d)dist=d;autoRot=false},
 stopRot(){autoRot=false},
 setChart(c){chartTab=c;drawChart()},
 openDict(k){showDict(k);return $('#dict h3').textContent},
 sample(){const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  let sum=0,nb=0,mx=0,cf=0;const cx2=W/2,cy2=H/2,rad=Math.min(W,H)*0.25;
  for(let i=0;i<W*H;i++){const l=(px[i*4]+px[i*4+1]+px[i*4+2])/3;
   sum+=l;if(l>10)nb++;if(l>mx)mx=l;
   const x=i%W,y=(i/W)|0;
   if((x-cx2)**2+(y-cy2)**2<rad*rad&&l>10)cf++}
  return {mean:sum/(W*H),nonblack:nb/(W*H),max:mx,centerFrac:cf/(Math.PI*rad*rad)}},
 sampleRGB(){const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  let r=0,g=0,b=0;
  for(let i=0;i<W*H;i++){r+=px[i*4];g+=px[i*4+1];b+=px[i*4+2]}
  return {r:r/(W*H),g:g/(W*H),b:b/(W*H)}},
 setSave(v){saveMode=v;resize()},setExpo(v){EX=v}};
