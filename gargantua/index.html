void main(){vec2 v=vec2(float(gl_VertexID<<1&2),float(gl_VertexID&2))*2.0-1.0;gl_Position=vec4(v,0.,1.);}`;
/* ── 主渲染：逐像素 binet RK4 ── */
const rayFS=`#version 300 es
precision highp float;out vec4 O;
uniform vec2 uRes;uniform vec3 uCam,uF,uR3,uU3;

vec3 tempRGB(float T){T=clamp(T,700.,40000.);float t=T/100.;float r,g,b;
 if(t<=66.){r=255.;g=99.47*log(t)-161.1;}else{r=329.7*pow(t-60.,-0.1332);g=288.1*pow(t-60.,-0.0755);}

/* 背景星空：3D cell hash + 银河带 */
vec3 stars(vec3 d){
 vec3 col=vec3(0.);
 float N=42.;
 vec3 cell=floor(d*N);
 for(int i=0;i<1;i++){
  uint h=uint(mod(cell.x+60.,120.))*7919u+uint(mod(cell.y+60.,120.))*104729u+uint(mod(cell.z+60.,120.))*13u;
  if(hu(h)<.22){

   float ang=distance(normalize(sp),d);
   float br=pow(hu(h+4u),9.)*1.5+.012;
   float sz=.0013+.0017*hu(h+5u);
   col+=mix(vec3(1.,.92,.8),vec3(.75,.85,1.),hu(h+6u))*br*exp(-ang*ang/(sz*sz));}}

vec3 diskEmit(float r,float az,float g){

 W=cv.width=innerWidth*d|0;H=cv.height=innerHeight*d|0;
 cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px'}
addEventListener('resize',resize);resize();

/* ══════════ 相机/状态 ══════════ */
let inc=87*Math.PI/180, yawAz=0, dist=25;
let dopOn=1,lensOn=1,spinOn=1,EX=0.9,tGlob=0,uQual=1,DPHI=0.023;
function camBasis(){ // 相机绕黑洞:极角 inc(离 z 轴),方位 yawAz;看向原点
 const sp=Math.sin(inc),cp=Math.cos(inc);
 const pos=[dist*sp*Math.cos(yawAz),dist*sp*Math.sin(yawAz),dist*cp];
 const f=pos.map(v=>-v/dist);
 let up0=[0,0,1];
 const r=[f[1]*up0[2]-f[2]*up0[1],f[2]*up0[0]-f[0]*up0[2],f[0]*up0[1]-f[1]*up0[0]];
 const rl=Math.hypot(...r),R=r.map(v=>v/rl);
 const U=[R[1]*f[2]-R[2]*f[1],R[2]*f[0]-R[0]*f[2],R[0]*f[1]-R[1]*f[0]];
 return {pos,f,r:R,u:U}}              /* U=R×f 已指向世界 +z 侧（屏幕上方=盘面上方） */
function render(){
 gl.viewport(0,0,W,H);
 const c=camBasis();
 gl.useProgram(pRay);
 gl.uniform2f(UL(pRay,'uRes'),W,H);
 gl.uniform3fv(UL(pRay,'uCam'),c.pos);
 gl.uniform3fv(UL(pRay,'uF'),c.f);
 gl.uniform3fv(UL(pRay,'uR3'),c.r);
 gl.uniform3fv(UL(pRay,'uU3'),c.u);
 gl.uniform1f(UL(pRay,'uT'),tGlob);
 gl.uniform1f(UL(pRay,'uEx'),EX);
 gl.uniform1f(UL(pRay,'uDop'),dopOn);
 gl.uniform1f(UL(pRay,'uLens'),lensOn);
 gl.uniform1f(UL(pRay,'uSpin'),spinOn);
 gl.uniform1f(UL(pRay,'uDbg'),dbgMode);
 gl.uniform1f(UL(pRay,'uQual'),uQual);
 gl.uniform1f(UL(pRay,'uDphi'),DPHI);
 gl.drawArrays(gl.TRIANGLES,0,3)}
let dbgMode=0;

let DEFL=null;
function chartDefl(){
 const w=860,h=320;ctx.clearRect(0,0,w,h);
 ctx.font='20px ui-monospace';ctx.fillStyle='#a8adbd';
 ctx.fillText('光线偏转角 α(b)（页内真算）—— b→b_c 时发散(缠绕)',26,30);
 const x0=80,x1=830,y0=54,y1=270,b0=2.4,b1=12;
 if(!DEFL){DEFL=[];for(let b=b0+0.02;b<=b1;b+=0.06){const r=traceRayJS(b,300,0.004);
  DEFL.push([b,r.cap?null:r.defl])}}
 const X=b=>x0+(b-b0)/(b1-b0)*(x1-x0), Y=a=>y1-Math.min(a,3.4)/3.4*(y1-y0);
 ctx.strokeStyle='rgba(168,173,189,.5)';ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x0,y1);ctx.lineTo(x1,y1);ctx.stroke();
 /* 弱场虚线 2/b */
 ctx.strokeStyle='rgba(143,198,255,.5)';ctx.setLineDash([6,5]);ctx.beginPath();
 for(let b=2.6;b<=b1;b+=0.1){const px=X(b),py=Y(2/b);b===2.6?ctx.moveTo(px,py):ctx.lineTo(px,py)}
 ctx.stroke();ctx.setLineDash([]);
 ctx.strokeStyle='#ffc987';ctx.lineWidth=2.5;ctx.beginPath();let pen=0;
 for(const[b,a]of DEFL){if(a===null){pen=0;continue}
  const px=X(b),py=Y(a);pen++?ctx.lineTo(px,py):ctx.moveTo(px,py)}
 ctx.stroke();
 ctx.strokeStyle='#ff8c7a';ctx.setLineDash([7,5]);ctx.beginPath();
 ctx.moveTo(X(BC),y0);ctx.lineTo(X(BC),y1);ctx.stroke();ctx.setLineDash([]);
 ctx.fillStyle='#ff8c7a';ctx.font='16px ui-monospace';
 ctx.fillText('b_c=√27/2≈2.598 rs（影子边界）',X(BC)+8,y0+18);
 ctx.fillStyle='#8fc6ff';ctx.fillText('弱场 α=2rs/b（爱因斯坦 1915）',X(6.5),Y(2/6.5)-12);
 ctx.fillStyle='#8a8f9e';ctx.font='15px sans-serif';
 ctx.fillText('b (冲击参数, rs) →',x1-160,y1+24);
 ctx.fillText('临界处光线绕黑洞打转——一圈、两圈……贴影细环由此而来',x0,308)}
function chartDisk(){
 const w=860,h=320;ctx.clearRect(0,0,w,h);
 ctx.font='20px ui-monospace';ctx.fillStyle='#a8adbd';
 ctx.fillText('盘温度 T∝r^(-¾) 与多普勒 g 因子（同一半径,两侧对比）',26,30);
 const x0=80,x1=830,y0=54,y1=270;
 const X=r=>x0+(r-3)/(14-3)*(x1-x0);
 ctx.strokeStyle='rgba(168,173,189,.5)';ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x0,y1);ctx.lineTo(x1,y1);ctx.stroke();
 /* T 剖面 */
 ctx.strokeStyle='#ffc987';ctx.lineWidth=2.5;ctx.beginPath();let pen=0;
 for(let r=3.02;r<=14;r+=0.05){const T=TprofJS(r)/0.488;
  const py=y1-T*(y1-y0)*0.92;pen++?ctx.lineTo(X(r),py):ctx.moveTo(X(r),py)}
 ctx.stroke();
 /* g 两侧（近似取 |Lz|=b_eff=r/√(1−1.5/r)? 用切向发射的极端:观察者盘面内） */
 ctx.lineWidth=2;
 for(const s of[1,-1]){ctx.strokeStyle=s>0?'#8fe6a0':'#ff9e8a';ctx.beginPath();pen=0;
  for(let r=3.2;r<=14;r+=0.1){
   const g=gJS(r,s*0.8*r/Math.sqrt(Math.max(r-1.5,0.1)));   /* 典型切向视线 Lz≈±0.8·r/√(r−1.5) */
   const py=y1-(clamp(g,0.3,1.6)-0.3)/1.3*(y1-y0);
   pen++?ctx.lineTo(X(r),py):ctx.moveTo(X(r),py)}
  ctx.stroke()}
 ctx.fillStyle='#8fe6a0';ctx.font='15px sans-serif';ctx.fillText('接近侧 g>1（增亮 g⁴）',X(6),y0+30);
 ctx.fillStyle='#ff9e8a';ctx.fillText('远离侧 g<1（变暗红移）',X(6),y1-16);
 ctx.fillStyle='#8a8f9e';ctx.fillText('r (rs) →',x1-70,y1+24);
 ctx.fillText('内缘 3rs=ISCO · 峰 4.08rs（涌现）· 电影级左右不对称=g⁴',x0,308)}
function drawChart(){chartTab==='defl'?chartDefl():chartDisk()}

 far:{inc:80,dist:48,st:['远望 —— 一颗发光的眼睛','退远一点,Gargantua 变成星空中的一枚亮环。EHT 拍 M87* 就是这个构图——只是分辨率相当于从地球看月球上的甜甜圈。','背景恒星在影子附近被拉扯成弧:那是爱因斯坦环的雏形。']}};

cv.addEventListener('click',e=>{
 const c=camBasis(),d=dpr*(saveMode?0.5:RSCALE);
 const px=(e.clientX*d*2-W)/H,py=-(e.clientY*d*2-H)/H;
 const rd=[c.f[0]+(px*c.r[0]+py*c.u[0])*.62,c.f[1]+(px*c.r[1]+py*c.u[1])*.62,c.f[2]+(px*c.r[2]+py*c.u[2])*.62];
 const L=Math.hypot(...rd);
 const h=traceDiskJS(c.pos,rd.map(v=>v/L),3,14,0.006,60);
 let key;
 if(h.type===1)key='影子与光子环';
 else if(h.type===2){
  if(h.phi>Math.PI*1.6)key='影子与光子环';
  else if(Math.abs(h.az)>Math.PI/2)key='上下双弧';
  else if(h.r<4.2)key='ISCO 内缘';
  else key=(h.Lz>0)?'左右为何不一样亮':'为什么盘是热的';}
 else key=(Math.random()<0.5)?'EHT 实拍':'电影与本页的差别';
 showDict(key)});
function showDict(key){const d=DICT[key];if(!d)return;
 dict.querySelector('h3').textContent=key;
 dict.querySelector('.rows').innerHTML=d[0].map(([k,v])=>`<div class="row"><span>${k}</span><b>${v}</b></div>`).join('');
 dict.querySelector('.blurb').textContent=d[1];
 dict.style.display='block'}
let drag=null,autoOrbit=true;
cv.addEventListener('pointerdown',e=>{drag=[e.clientX,e.clientY];autoOrbit=false});
addEventListener('pointermove',e=>{if(!drag)return;
 yawAz+=(e.clientX-drag[0])*0.004;
 inc=clamp(inc+(e.clientY-drag[1])*0.003,40*Math.PI/180,89.7*Math.PI/180);
 $('#sInc').value=inc*180/Math.PI;
 drag=[e.clientX,e.clientY]});
addEventListener('pointerup',()=>drag=null);
cv.addEventListener('wheel',e=>{e.preventDefault();dist=clamp(dist*Math.exp(e.deltaY*0.001),14,70)},{passive:false});
$('#notetxt').innerHTML=['<b style="color:#9fe6a0">真算</b>：每像素一条光线在史瓦西度规下 RK4 积分 binet 方程 u″=−u+3/2·rs·u²（GPU 内 ~500 步,与 Node 端 proto 逐字对拍 16/16）;影子边界 b_c=√27/2 rs、上下双弧、贴影高阶像、背景星透镜全部涌现非贴图;多普勒/引力 g=√(1−1.5/r)/(1−ΩL_z) 逐像素,亮度 I∝g⁴、色温 T_obs=g·T_em;盘温度 SS 剖面 T∝r^{-3/4}(1−√(r_in/r))^{1/4},峰 4.08 rs 涌现;盘转速=真开普勒 Ω=√(M/r³)(流纹差速可见)。',
'<b style="color:#ff9e7a">示意/声明</b>：本页为无自旋史瓦西精确解;电影 Gargantua 为 Kerr a≈0.999(影子 D 形、盘内缘更深),见词典;盘温度定标 6400 K 为可见光化艺术选择(真实恒星级黑洞盘 ~10⁷ K,X 射线);盘面流纹为示意纹理(差速为真);薄盘不透明近似;逃逸光线用轨道面渐近方向查星空(有限截断 r=55 rs);星空为程序生成。',
'<b style="color:#8fc6ff">对照开关</b>：关"引力弯曲"=光走直线的牛顿宇宙;关"多普勒"=静止盘。两个开关就是本页的全部论点。'].map(s=>`<div style="margin:4px 0">${s}</div>`).join('');

/* ══════════ 主循环 ══════════ */
let last=0,fps=[],hidden=false;
document.addEventListener('visibilitychange',()=>hidden=document.hidden);
if(matchMedia('(prefers-reduced-motion: reduce)').matches){saveMode=true;resize()}
function loop(ts){requestAnimationFrame(loop);
 if(hidden)return;
 const dt=Math.min((ts-last)/1000,0.1);
 if(ts-last<1000/46)return;
 fps.push(1/(dt||0.016));if(fps.length>60)fps.shift();
 last=ts;tGlob+=dt;
 if(!drag&&autoOrbit)yawAz+=dt*0.016;
 render()}
requestAnimationFrame(loop);
setStory(...VIEWS.film.st);drawChart();

/* ══════════ 验证钩子 ══════════ */
window.__GG__={
 traceDiskJS,traceRayJS,gJS,TprofJS,BC,
 camBasis,
 state(){return {inc:inc*180/Math.PI,yawAz,dist,dopOn,lensOn,fps:fps.length?fps.reduce((a,b)=>a+b)/fps.length:0}},
 set(o){if(o.inc!==undefined)inc=o.inc*Math.PI/180;if(o.yawAz!==undefined)yawAz=o.yawAz;
  if(o.dist!==undefined)dist=o.dist;if(o.dop!==undefined)dopOn=o.dop;
  if(o.lens!==undefined)lensOn=o.lens;if(o.spin!==undefined)spinOn=o.spin;
  if(o.ex!==undefined)EX=o.ex;if(o.qual!==undefined)uQual=o.qual;
  if(o.dbg!==undefined)dbgMode=o.dbg;if(o.orbit!==undefined)autoOrbit=!!o.orbit;
  if(o.rscale!==undefined){RSCALE=o.rscale;resize()}},
 rayAt(nx,ny){ // 屏幕 NDC(-1..1,y 上正)→光线方向（与 shader 同式,供对拍）
  const c=camBasis();
  const px=nx*(W/H),py=ny;
  const rd=[c.f[0]+(px*c.r[0]+py*c.u[0])*.62,c.f[1]+(px*c.r[1]+py*c.u[1])*.62,c.f[2]+(px*c.r[2]+py*c.u[2])*.62];
  const L=Math.hypot(...rd);return {pos:c.pos,dir:rd.map(v=>v/L)}},
 sample(){const px=new Uint8Array(W*H*4);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  let sum=0,nb=0,mx=0,cf=0;const cx=W/2,cy=H/2,rad=Math.min(W,H)*0.25;
  for(let i=0;i<W*H;i++){const l=(px[i*4]+px[i*4+1]+px[i*4+2])/3;
   sum+=l;if(l>10)nb++;if(l>mx)mx=l;
   const x=i%W,y=(i/W)|0;
   if((x-cx)**2+(y-cy)**2<rad*rad&&l>10)cf++}
  return {mean:sum/(W*H),nonblack:nb/(W*H),max:mx,centerFrac:cf/(Math.PI*rad*rad)}},
 readRow(yFrac,n){ // 屏幕某行 n 个采样(RGB)
  const px=new Uint8Array(W*H*4);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  const y=Math.round(H*yFrac),out=[];
  for(let k=0;k<n;k++){const x=Math.round((k+0.5)/n*(W-1));
   const i=(y*W+x)*4;out.push([px[i],px[i+1],px[i+2]])}
  return out},
 readCol(xFrac,n){
  const px=new Uint8Array(W*H*4);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  const x=Math.round(W*xFrac),out=[];
  for(let k=0;k<n;k++){const y=Math.round((k+0.5)/n*(H-1));
   const i=(y*W+x)*4;out.push([px[i],px[i+1],px[i+2]])}
  return out},
 halves(){const px=new Uint8Array(W*H*4);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  let l=0,r=0;
  for(let y=0;y<H;y+=2)for(let x=0;x<W;x+=2){
   const i=(y*W+x)*4,v=(px[i]+px[i+1]+px[i+2])/3;
   (x<W/2?l+=v:r+=v)}
  return {left:l,right:r}},
 W:()=>W,H:()=>H,
 openDict(k){showDict(k);return $('#dict h3').textContent}};
