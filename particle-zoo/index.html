function setLab(tab){labTab=tab;
 $$('#lab .tabs .mbtn').forEach(x=>x.classList.toggle('on',x.dataset.l===tab));
 const L=$('#lbody');
 if(tab==='confine'){yaw=1.5708;pitch=0.1;dist=2.0;
  L.innerHTML=`<div class="ctl">把介子里的正反夸克往两边拉：<br>
   <input type="range" id="cR" min="${R0Q}" max="2.2" step="0.005" value="${conf.r}" style="width:100%;accent-color:#ffd27f">
   <div id="ebar"><div></div></div><div id="cTxt"></div>
   <button id="cReset">↺ 重新来一根弦</button></div>`;
  $('#cR').oninput=e=>{if(conf.broken)return;conf.r=+e.target.value;
   const E=Vc(conf.r)-Vc(R0Q);
   $('#ebar>div').style.width=clamp(E/EBRK*100,0,100)+'%';
   $('#cTxt').innerHTML=E<EBRK?`弦储能 <b style="color:#ffd27f">${E.toFixed(2)} / ${EBRK.toFixed(2)} GeV</b>（还差 ${(EBRK-E).toFixed(2)} 就够造一对新夸克）`:'';
   if(E>=EBRK&&!conf.broken){conf.broken=1;conf.brokeAt=tGlob;
    $('#cTxt').innerHTML='<b style="color:#ff8c7a">啪！</b>储能变成了一对新的正反夸克——你得到两个介子，还是没有自由夸克。'}
   drawChart()};
  $('#cReset').onclick=()=>{conf.broken=0;conf.r=R0Q;$('#cR').value=R0Q;
   $('#ebar>div').style.width='0%';$('#cTxt').textContent='';drawChart()};
  setStory('实验一 · 夸克禁闭','强力像一根橡皮筋：拉得越远拉力越不减。拉断的瞬间，储存的能量按 E=mc² 变成一对新的正反夸克——你手里变成两根更短的橡皮筋。','Cornell 势真算（αs=0.3, κ=0.9 GeV/fm）；断裂阈值取一对组分夸克 0.66 GeV（真实为概率性隧穿，Schwinger 机制）。')}
 else if(tab==='build'){yaw=1.5708;pitch=0.5;dist=2.3;
  L.innerHTML=`<div class="ctl">
   <button id="bMode3">重子（3 夸克）</button><button id="bMode2">介子（夸克+反夸克）</button><br>
   <span id="slots"></span><div class="res" id="bRes"></div></div>`;
  const paint=()=>{const n=build.mode;
   $('#slots').innerHTML=build.slots.slice(0,n).map((q,i)=>{
    const cc=n===3?['#ff5a5f','#4fd66a','#5a8cff'][i]:(i===0?'#ff5a5f':'#6ee7e7');
    return `<span class="slot" data-i="${i}" style="border-color:${cc};color:${cc}">${q}</span>`}).join('')
    +`<span style="color:#7c8798;font-size:12px">（点小球换味）</span>`;
   $$('#lab .slot').forEach(sl=>sl.onclick=()=>{const i=+sl.dataset.i;
    const cyc=(build.mode===2&&i===1)?QBAR:QCYC;
    const cur=cyc.indexOf(build.slots[i]);build.slots[i]=cyc[(cur+1)%cyc.length];paint()});
   const j=judgeHadron(build.slots.slice(0,n));
   $('#bRes').innerHTML=j.hit?`<b>✔ ${j.hit[0]}</b> · ${j.hit[1]}<br>${j.hit[2]}`
    :`未命中已知基态强子（电荷 ${j.Q>0?'+':''}${(Math.round(j.Q*3)/3).toFixed(2).replace('.00','').replace('0.67','2/3').replace('0.33','1/3')}）`;
   drawChart()};
  $('#bMode3').onclick=()=>{build.mode=3;build.slots=['u','u','d'];paint()};
  $('#bMode2').onclick=()=>{build.mode=2;build.slots=['u','d̄'];paint()};
  paint();
  setStory('实验二 · 强子工坊','用夸克拼出真实存在的粒子。规则只有两条：色必须配成白（三色各一，或色+反色）；电荷自动加和。拼出 sss 试试——那是夸克模型封神的 Ω⁻。','强子数据 PDG；电荷加和与色约束为真算（proto 16 条全核对）。')}
 else{yaw=0.9;pitch=0.3;dist=2.2;
  L.innerHTML=`<div class="ctl">
   <button id="bFire">☢ 让中子衰变</button><button id="bF100">×100 快速累积</button><button id="bClr">清空能谱</button>
   <div class="res" id="bTxt">自由中子平均寿命 878 秒。它体内一个 d 夸克会突然变成 u——经由一颗转瞬即逝的 W⁻。</div></div>`;
  $('#bFire').onclick=()=>{beta.anim=tGlob;beta.samples.push(betaSample());beta.cnt++;
   $('#bTxt').innerHTML=`第 <b>${beta.cnt}</b> 次衰变：n → p + e⁻ + ν̄ₑ。电子分走 <b>${(beta.samples[beta.samples.length-1]*1000).toFixed(0)} keV</b>（每次都不一样——三体分账，中微子拿走剩下的）`;
   drawChart()};
  $('#bF100').onclick=()=>{for(let i=0;i<100;i++)beta.samples.push(betaSample());beta.cnt+=100;drawChart()};
  $('#bClr').onclick=()=>{beta.samples.length=0;beta.cnt=0;drawChart()};
  setStory('实验三 · β 衰变','中子单独放 15 分钟就会散伙：udd 里的一个 d 变成 u。电子能谱是连续的——1930 年这吓坏了物理学家（能量不守恒？！），泡利被迫发明了中微子来"记账"。','谱形 = 相空间 p·E·(Q−T)² 真抽样；Q=0.782 MeV 由中子/质子/电子质量差涌现；忽略库仑修正（~几%）。')}
 drawChart()}

cv.addEventListener('click',e=>{if(mode!=='gallery')return;
 const c=camBasis();
 const px=(e.clientX*(saveMode?dpr*0.62:dpr)*2-W)/H*1, py=-(e.clientY*(saveMode?dpr*0.62:dpr)*2-H)/H;
 const rd=[c.f[0]+ (px*c.r[0]+py*c.u[0])*.62, c.f[1]+(px*c.r[1]+py*c.u[1])*.62, c.f[2]+(px*c.r[2]+py*c.u[2])*.62];
 const L=Math.hypot(...rd);rd[0]/=L;rd[1]/=L;rd[2]/=L;
 let best=null,bd=1e9;
 for(const p of GAL){const oc=[p.x-c.pos[0],0-c.pos[1],p.y-c.pos[2]];
  const tca=oc[0]*rd[0]+oc[1]*rd[1]+oc[2]*rd[2];if(tca<0)continue;
  const d2=oc[0]**2+oc[1]**2+oc[2]**2-tca*tca;
  if(d2<(p.sz*1.6)**2&&tca<bd){bd=tca;best=p}}
 if(best)showDict(best.id)});

'<b style="color:#ff9e7a">示意</b>：夸克运动轨迹/流管形状（真实为量子场无经典轨道，节奏放慢~10²³ 倍）；粒子"发光球"大小∝log质量（基本粒子无已知尺寸<10⁻¹⁹m）；W 玻色子飞行时间放大~10²⁵ 倍；β 谱忽略库仑修正（几%）；弦断裂取固定阈值（真实为概率性 Schwinger 隧穿）；海夸克密度/量子泡沫为艺术化。',

/* ══════════════════ 主循环（45fps cap + 省电） ══════════════════ */
let last=0,acc=0,fps=[],hidden=false;
document.addEventListener('visibilitychange',()=>hidden=document.hidden);
const battery=matchMedia('(prefers-reduced-motion: reduce)').matches;
if(battery){saveMode=true;resize()}
function loop(ts){requestAnimationFrame(loop);
 if(hidden)return;
 const dt=Math.min((ts-last)/1000,0.1);
 if(ts-last<1000/46)return;
 fps.push(1/(dt||0.016));if(fps.length>60)fps.shift();
 last=ts;tGlob+=dt;
 if(autoRot&&mode!=='gallery')yaw+=dt*0.05;
 if(cruise&&mode==='dive'){S=Math.max(-18.5,S-dt*0.28);$('#sS').value=S;
  if(S<=-18.5){cruise=false;$('#cruise').textContent='▶ 自动下潜'}
  updHUD()}
 if(mode==='lab'&&labTab==='beta'&&beta.anim>=0&&tGlob-beta.anim>3.2)beta.anim=-1;
 render(dt)}
requestAnimationFrame(loop);
updHUD();drawChart();

window.__PZ__={
 // 数值
 psiJS,RAD,SPH,ORBS,En,lamNm,Vc,rBreak,QB,fBeta,betaSample,judgeHadron,colorSwapTest,SM,HADRONS,PSIMAX,
 radNorm(k){const f=RAD[k],n=24000,h=120/n;let s=0;
  for(let i=0;i<=n;i++){const r=i*h||1e-12,w=i===0||i===n?1:i%2?4:2;s+=w*f(r)**2*r*r}return s*h/3},
 betaMC(n){const arr=[];for(let i=0;i<n;i++)arr.push(betaSample());return arr},
 // 状态控制
 setMode(m){$$('#modes .mbtn').find(b=>b.dataset.m===m).click()},
 setS(v){S=clamp(v,-18.5,-9.8);$('#sS').value=S;cruise=false;updHUD()},
 setOrb(i){orbSel=i;$$('#orbs .ob').forEach((x,k)=>x.classList.toggle('on',k===i));
  if(mode==='dive'){S=ORBFIT[i];$('#sS').value=S;cruise=false;updHUD()}},
 setLabTab(t){setLab(t)},
 setConf(r){conf.broken=0;conf.r=r;const E=Vc(r)-Vc(R0Q);if(E>=EBRK){conf.broken=1;conf.brokeAt=tGlob}
  const el=$('#cR');if(el){el.value=r;const bar=$('#ebar>div');if(bar)bar.style.width=clamp(E/EBRK*100,0,100)+'%'}
  drawChart()},
 setBuild(slots){build.mode=slots.length;build.slots=[...slots];if(mode==='lab'&&labTab==='build')setLab('build');return judgeHadron(slots)},
 fireBeta(n){for(let i=0;i<n;i++)beta.samples.push(betaSample());drawChart();return beta.samples.length},
 state(){return {mode,labTab,S,orbSel,confR:conf.r,broken:conf.broken,
  station:mode==='dive'?(STATIONS.find(x=>S<=x.s0&&S>=x.s1)||{t:'?'}).t:mode+'/'+labTab,
  betaN:beta.samples.length,fps:fps.length?fps.reduce((a,b)=>a+b)/fps.length:0}},
 setYawPitch(y,p){yaw=y;pitch=p;autoRot=false},
 stopRot(){autoRot=false},
 // 像素采样
 sample(){const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  let sum=0,nb=0,mx=0,cf=0;const cx=W/2,cy=H/2,rad=Math.min(W,H)*0.25;
  for(let i=0;i<W*H;i++){const l=(px[i*4]+px[i*4+1]+px[i*4+2])/3;
   sum+=l;if(l>10)nb++;if(l>mx)mx=l;
   const x=i%W,y=(i/W)|0;
   if((x-cx)**2+(y-cy)**2<rad*rad&&l>10)cf++}
  return {mean:sum/(W*H),nonblack:nb/(W*H),max:mx,centerFrac:cf/(Math.PI*rad*rad)}},
 sampleRadial(nb){ // 以屏心为圆心的径向亮度均值（体渲染节点检测用）
  const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  const cx=W/2,cy=H/2,rmax=Math.min(W,H)*0.48,bins=new Array(nb).fill(0),cnt=new Array(nb).fill(0);
  for(let y=0;y<H;y+=2)for(let x=0;x<W;x+=2){
   const r=Math.hypot(x-cx,y-cy);if(r>=rmax)continue;
   const i=(y*W+x)*4,l=(px[i]+px[i+1]+px[i+2])/3,b=Math.min(nb-1,r/rmax*nb|0);
   bins[b]+=l;cnt[b]++}
  return bins.map((v,i)=>v/Math.max(1,cnt[i]))},
 sampleBands(n){ // 水平条带亮度（上→下），2pz 双瓣检测
  const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  const bands=new Array(n).fill(0),cnt=new Array(n).fill(0);
  const x0=W/2-H*0.3,x1=W/2+H*0.3;
  for(let y=0;y<H;y+=2)for(let x=Math.max(0,x0|0);x<Math.min(W,x1);x+=2){
   const i=(y*W+x)*4,l=(px[i]+px[i+1]+px[i+2])/3,b=Math.min(n-1,(H-1-y)/H*n|0);
   bands[b]+=l;cnt[b]++}
  return bands.map((v,i)=>v/Math.max(1,cnt[i]))},
 setSave(v){saveMode=v;resize()},setExpo(v){EX=v}};
