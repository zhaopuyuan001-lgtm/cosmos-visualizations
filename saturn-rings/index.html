function makeLabA(){ // 卡西尼缝的诞生：Mimas×300
  const MUL=300,mu2=GM*mMimas*MUL,nM=Math.sqrt(GM/aMimas**3);
  const N=2200,rnd=mulberry32(7);
  const P=new Float64Array(N*4),A0=new Float64Array(N);
  for(let i=0;i<N;i++){const a=115800+rnd()*2200,th=rnd()*6.2832,v=Math.sqrt(GM/a);
   P[i*4]=a*Math.cos(th);P[i*4+1]=a*Math.sin(th);P[i*4+2]=-v*Math.sin(th);P[i*4+3]=v*Math.cos(th);A0[i]=a}
  return {P,A0,N,mu2,nM,t:0,dt:Torb(116877)/160,orbits:0,on:1,
   Tp:Torb(116877)};
}
function makeLabB(){ // Daphnis 水波
  const mu2=6.6743e-20*7.7e13,aD=136505,nD=Math.sqrt(GM/aD**3);
  const N=2600,rnd=mulberry32(11);
  const P=new Float64Array(N*4),A0=new Float64Array(N),SD=new Float64Array(N);
  for(let i=0;i<N;i++){const side=i%2?1:-1;
   const a=aD+side*(40+(rnd()-0.5)*8);   /* 窄散布：λ=3πΔa 各粒子一致才叠得出干净波形 */
   const th=0.003+rnd()*0.0195;const v=Math.sqrt(GM/a); /* 避开"出生即交会"粒子 */
   P[i*4]=a*Math.cos(th);P[i*4+1]=a*Math.sin(th);P[i*4+2]=-v*Math.sin(th);P[i*4+3]=v*Math.cos(th);
   A0[i]=a;SD[i]=side}
  return {P,A0,SD,N,mu2,aD,nD,t:0,dt:2*Math.PI/nD/2600,TD:2*Math.PI/nD};
}
let labA=makeLabA(),labB=makeLabB();
function stepBody(L,steps,aM,nM,mu2){ // 通用 RK4 推进（含间接项；全标量零分配）

  let a1x=0,a1y=0,a2x=0,a2y=0,a3x=0,a3y=0,a4x=0,a4y=0;
  for(let s=0;s<steps;s++){
    const t=L.t;
    const mx=aM*Math.cos(nM*t),my=aM*Math.sin(nM*t);
    const mxh=aM*Math.cos(nM*(t+dt/2)),myh=aM*Math.sin(nM*(t+dt/2));
    const mx1=aM*Math.cos(nM*(t+dt)),my1=aM*Math.sin(nM*(t+dt));
    const ix=ind*mx,iy=ind*my,ixh=ind*mxh,iyh=ind*myh,ix1=ind*mx1,iy1=ind*my1;
    for(let i=0;i<N;i++){
      const o=i*4,x=P[o],y=P[o+1],vx=P[o+2],vy=P[o+3];
      let r2=x*x+y*y,r=Math.sqrt(r2),g=-GMl/(r2*r);

      if(mu2>0){const dx=x-mx,dy=y-my,d2=dx*dx+dy*dy,dd=Math.sqrt(d2),gm=-mu2/(d2*dd);
       a1x+=gm*dx-ix;a1y+=gm*dy-iy}
      let px=x+vx*dt/2,py=y+vy*dt/2;
      r2=px*px+py*py;r=Math.sqrt(r2);g=-GMl/(r2*r);
      a2x=g*px;a2y=g*py;
      if(mu2>0){const dx=px-mxh,dy=py-myh,d2=dx*dx+dy*dy,dd=Math.sqrt(d2),gm=-mu2/(d2*dd);
       a2x+=gm*dx-ixh;a2y+=gm*dy-iyh}
      const v2x=vx+a1x*dt/2,v2y=vy+a1y*dt/2;
      px=x+v2x*dt/2;py=y+v2y*dt/2;
      r2=px*px+py*py;r=Math.sqrt(r2);g=-GMl/(r2*r);
      a3x=g*px;a3y=g*py;
      if(mu2>0){const dx=px-mxh,dy=py-myh,d2=dx*dx+dy*dy,dd=Math.sqrt(d2),gm=-mu2/(d2*dd);
       a3x+=gm*dx-ixh;a3y+=gm*dy-iyh}
      const v3x=vx+a2x*dt/2,v3y=vy+a2y*dt/2;
      px=x+v3x*dt;py=y+v3y*dt;

      a4x=g*px;a4y=g*py;

      P[o+1]=y+dt/6*(vy+2*v2y+2*v3y+(vy+a3y*dt));
      P[o+2]=vx+dt/6*(a1x+2*a2x+2*a3x+a4x);
      P[o+3]=vy+dt/6*(a1y+2*a2y+2*a3y+a4y);

}
function eccA(P,o){const x=P[o],y=P[o+1],vx=P[o+2],vy=P[o+3];

function labAProfile(nb=22){ // e(a0) 中位数剖面
  const bins=Array.from({length:nb},()=>[]);
  for(let i=0;i<labA.N;i++){const b=Math.min(nb-1,Math.floor((labA.A0[i]-115800)/2200*nb));
   bins[b].push(eccA(labA.P,i*4).e)}
  const med=a=>{if(!a.length)return 0;const s=a.sort((x,y)=>x-y);return s[s.length>>1]};
  return bins.map(med)}
function labBWave(nb=90){ // δr(Δθ) 波形（trailing 侧,外带）
  const thD=(labB.nD*labB.t)%(2*Math.PI),pts=[];
  for(let i=0;i<labB.N;i++){if(labB.SD[i]<0)continue;
   const o=i*4,r=Math.hypot(labB.P[o],labB.P[o+1]),th=Math.atan2(labB.P[o+1],labB.P[o]);
   let d=th-thD;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;
   if(d<-0.0005&&d>-0.016)pts.push([d,r-labB.A0[i]])}

  for(const[d,dr]of pts){const b=Math.min(nb-1,Math.floor((d-w0)/(w1-w0)*nb));bs[b]+=dr;bc[b]++}
  return {prof:bs.map((v,i)=>bc[i]?v/bc[i]:0),cnt:bc,w0,w1}}
function labBLambda(){ // 涌现波长 km：扫频 DFT 主峰（对早期噪声段稳健）
  const {prof,cnt,w0,w1}=labBWave(90);
  const sig=prof.map((v,i)=>cnt[i]>2?v:0);
  const mean=sig.reduce((a,b)=>a+b,0)/90;
  let bestK=0,bp=0;
  for(let k=2;k<=20;k+=0.25){
   let re=0,im=0;
   for(let i=0;i<90;i++){const ph=2*Math.PI*k*i/90;
    re+=(sig[i]-mean)*Math.cos(ph);im+=(sig[i]-mean)*Math.sin(ph)}
   const p=re*re+im*im;if(p>bp){bp=p;bestK=k}}
  if(!bestK)return 0;
  return Math.abs(w1-w0)*136505/bestK}

 sample(){const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  let sum=0,nb=0,mx=0,cf=0;const cx=W/2,cy=H/2,rad=Math.min(W,H)*0.25;
  for(let i=0;i<W*H;i++){const l=(px[i*4]+px[i*4+1]+px[i*4+2])/3;
   sum+=l;if(l>10)nb++;if(l>mx)mx=l;
   const x=i%W,y=(i/W)|0;
   if((x-cx)**2+(y-cy)**2<rad*rad&&l>10)cf++}
  return {mean:sum/(W*H),nonblack:nb/(W*H),max:mx,centerFrac:cf/(Math.PI*rad*rad)}},
 sampleRadial(nb){const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  const cx=W/2,cy=H/2,rmax=Math.min(W,H)*0.48,bins=new Array(nb).fill(0),cnt=new Array(nb).fill(0);
  for(let y=0;y<H;y+=2)for(let x=0;x<W;x+=2){
   const r=Math.hypot(x-cx,y-cy);if(r>=rmax)continue;
   const i=(y*W+x)*4,l=(px[i]+px[i+1]+px[i+2])/3,b=Math.min(nb-1,r/rmax*nb|0);
   bins[b]+=l;cnt[b]++}
  return bins.map((v,i)=>v/Math.max(1,cnt[i]))},
 sampleBands(n){const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  const bands=new Array(n).fill(0),cnt=new Array(n).fill(0);
  for(let y=0;y<H;y+=2)for(let x=0;x<W;x+=2){
   const i=(y*W+x)*4,l=(px[i]+px[i+1]+px[i+2])/3,b=Math.min(n-1,(H-1-y)/H*n|0);
   bands[b]+=l;cnt[b]++}
  return bands.map((v,i)=>v/Math.max(1,cnt[i]))},
 sampleHalves(){const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  let l=0,r=0;
  for(let y=0;y<H;y+=2)for(let x=0;x<W;x+=2){
   const i=(y*W+x)*4,v=(px[i]+px[i+1]+px[i+2])/3;
   (x<W/2?l+=v:r+=v)}
  return {left:l,right:r}},
 radialLine(n){ // 沿屏幕中心向右水平线采样：逐像素解环面物理半径（km）+亮度（消透视混叠）
  const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  const c=camBasis(),out=[];
  for(let k=0;k<n;k++){
   const x=Math.round(W/2+ (k+0.5)/n*(W/2-6)), y=Math.round(H/2);
   const ndx=(2*x-W)/H, ndy=0;
   const rd=[c.f[0]+(ndx*c.r[0]+ndy*c.u[0])*.62,c.f[1]+(ndx*c.r[1]+ndy*c.u[1])*.62,c.f[2]+(ndx*c.r[2]+ndy*c.u[2])*.62];
   if(Math.abs(rd[2])<1e-8){continue}
   const t=-c.pos[2]/rd[2];if(t<=0)continue;
   const hx=c.pos[0]+rd[0]*t,hy=c.pos[1]+rd[1]*t;
   const km=Math.hypot(hx,hy)*RS;
   let lum=0;for(let dy=-3;dy<=3;dy++){const i=((y+dy)*W+x)*4;lum+=(px[i]+px[i+1]+px[i+2])/3}
   out.push([km,lum/7])}
  return out},
 sampleBandsSide(n){ // 只统计左右外侧 1/3（避开中央行星）的水平条带
  const px=new Uint8Array(W*H*4);gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  const bands=new Array(n).fill(0),cnt=new Array(n).fill(0);
  for(let y=0;y<H;y+=2)for(let x=0;x<W;x+=2){
   if(x>W/3&&x<W*2/3)continue;
   const i=(y*W+x)*4,l=(px[i]+px[i+1]+px[i+2])/3,b=Math.min(n-1,(H-1-y)/H*n|0);
   bands[b]+=l;cnt[b]++}
  return bands.map((v,i)=>v/Math.max(1,cnt[i]))},
 setSave(v){saveMode=v;resize()},setExpo(v){EX=v},setN(n){NPART=n}};
